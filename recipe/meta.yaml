{% set name = "sphinx-favicon" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 6f65939fc2a6ac4259c88b09169f0b72681cd4c03dd1d0cf91c57a1fa314e50b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=40.9.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - sphinx >=3.4

test:
  imports:
    - sphinx_favicon
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/tcmetzger/sphinx-favicon
  summary: Sphinx Extension adding support for custom favicons
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tcmetzger
    - 12rambau
